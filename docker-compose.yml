services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsedock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsedock}
      POSTGRES_DB: ${POSTGRES_DB:-pulsedock}
    volumes:
      - pulsedock_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    command: npm run prisma:deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsedock}:${POSTGRES_PASSWORD:-pulsedock}@postgres:5432/${POSTGRES_DB:-pulsedock}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsedock}:${POSTGRES_PASSWORD:-pulsedock}@postgres:5432/${POSTGRES_DB:-pulsedock}?schema=public
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      CHECK_HISTORY_RETENTION_DAYS: ${CHECK_HISTORY_RETENTION_DAYS:-30}
      ALERT_PROVIDER: ${ALERT_PROVIDER:-none}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  pulsedock_postgres_data:
